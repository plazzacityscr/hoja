# ===========================================
# Leaf PHP - Development Docker Compose
# ===========================================
# Usage:
#   docker-compose up -d           # Start all services
#   docker-compose down            # Stop all services
#   docker-compose logs -f app     # Follow app logs
#   docker-compose exec app bash   # Enter app container
# ===========================================

version: '3.8'

services:
  # ===========================================
  # PHP Application Server
  # ===========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: leaf_app
    restart: unless-stopped
    working_dir: /app
    volumes:
      # Mount application code for hot-reload
      - ./:/app
      # Mount composer cache to avoid re-downloading
      - composer_cache:/app/vendor
    ports:
      - "8000:8000"
      - "9003:9003"  # Xdebug port
    environment:
      - APP_ENV=development
      - APP_DEBUG=true
      - XDEBUG_CONFIG=client_host=host.docker.internal
      - PHP_IDE_CONFIG=serverName=leaf_php
    depends_on:
      - mysql
      - redis
    networks:
      - leaf_network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ===========================================
  # Nginx Web Server (Optional - for production-like testing)
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: leaf_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - leaf_network
    profiles:
      - with-nginx

  # ===========================================
  # MySQL Database
  # ===========================================
  mysql:
    image: mysql:8.0
    container_name: leaf_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: leaf_app
      MYSQL_USER: leaf
      MYSQL_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - leaf_network
    profiles:
      - with-db

  # ===========================================
  # PostgreSQL Database (Alternative to MySQL)
  # ===========================================
  postgres:
    image: postgres:15-alpine
    container_name: leaf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: leaf
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: leaf_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - leaf_network
    profiles:
      - with-db

  # ===========================================
  # Redis Cache
  # ===========================================
  redis:
    image: redis:7-alpine
    container_name: leaf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - leaf_network
    profiles:
      - with-cache

  # ===========================================
  # phpMyAdmin (MySQL Management)
  # ===========================================
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: leaf_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: secret
    ports:
      - "8081:80"
    depends_on:
      - mysql
    networks:
      - leaf_network
    profiles:
      - with-db

  # ===========================================
  # Mailhog (Email Testing)
  # ===========================================
  mailhog:
    image: mailhog/mailhog
    container_name: leaf_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP port
      - "8025:8025"  # Web UI
    networks:
      - leaf_network
    profiles:
      - with-mail

networks:
  leaf_network:
    driver: bridge

volumes:
  mysql_data:
  postgres_data:
  redis_data:
  composer_cache:
